{% extends 'main/base.html' %}

{% block title %} Rejestracja {% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mt-5">Zarejestruj się</h2>
            <form method="POST" class="mt-4">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger">
                                {{ field.errors }}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}
                <div class="text-center">
                    <button type="submit" class="btn btn-success">Zarejestruj</button>
                </div>
            </form>
            <div class="text-center mt-3">
                <p>Masz już konto? <a href="{% url 'login' %}">Zaloguj się</a></p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Mimicking the style from login.html if needed, but using Bootstrap classes is better */
    input {
        display: block;
        width: 100%;
        padding: .375rem .75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        border-radius: .25rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
    }
</style>
{% endblock %}
